name: Daily sync upstream + build combined playlist

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC = 03:00 America/Montreal (hiver)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_build_pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/iptv-org/iptv.git || true
          git remote -v

      - name: Fetch upstream
        run: |
          git fetch upstream master --prune

      - name: Save custom files before reset
        run: |
          mkdir -p /tmp/custom_keep/scripts /tmp/custom_keep/custom2
          if [ -f scripts/build-combined-m3u.sh ]; then cp -f scripts/build-combined-m3u.sh /tmp/custom_keep/scripts/; fi
          if [ -f custom2/my.m3u ]; then cp -f custom2/my.m3u /tmp/custom_keep/custom2/; fi

      - name: Reset work branch to upstream (NO MERGE COMMIT)
        run: |
          git checkout -B bot/daily-sync
          git reset --hard upstream/master

      - name: Restore custom files after reset
        run: |
          mkdir -p scripts custom2
          if [ -f /tmp/custom_keep/scripts/build-combined-m3u.sh ]; then cp -f /tmp/custom_keep/scripts/build-combined-m3u.sh scripts/; fi
          if [ -f /tmp/custom_keep/custom2/my.m3u ]; then cp -f /tmp/custom_keep/custom2/my.m3u custom2/; fi

      - name: Build combined playlist
        run: |
          chmod +x scripts/build-combined-m3u.sh
          bash scripts/build-combined-m3u.sh

      - name: Debug changes
        run: |
          git status
          git diff --stat || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/daily-sync
          base: master
          title: "Daily upstream sync + rebuild combined.m3u"
          body: |
            - Sync depuis https://github.com/iptv-org/iptv (master)
            - Regénération de custom2/combined.m3u = index.m3u + custom2/my.m3u
          labels: |
            upstream-sync
            playlist
          commit-message: "chore: rebuild combined playlist"
          add-paths: |
            scripts/build-combined-m3u.sh
            custom2/my.m3u
            custom2/combined.m3u
          skip-no-changes: true
